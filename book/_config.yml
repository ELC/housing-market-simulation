title: "Housing Market Simulation"
copyright: '2026, Ezequiel Leonardo Castaño'
author: 'Ezequiel Leonardo Castaño'

execute:
  execute_notebooks: "force"

html:
  use_edit_page_button : true
  use_repository_button: true
  baseurl              : 'https://elc.github.io/housing-market-simulation'

repository:
  url: 'https://github.com/elc/housing-market-simulation'
  branch: master

launch_buttons:
  binderhub_url: "https://mybinder.org"
  colab_url    : "https://colab.research.google.com"
  thebe        : true

latex:
  latex_documents:
    targetname: book.tex

parse:
  myst_enable_extensions:
    - html_image
    - dollarmath


bibtex_bibfiles:
  - bibliography.bib

sphinx:
  config:
    bibtex_reference_style: author_year
